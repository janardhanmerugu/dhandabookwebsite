<!doctype html>
<html lang="en" data-bs-theme="blue-theme">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dhanda Books - Login</title>

  <!--favicon-->
  <link rel="icon" href="assets/images/favicon-32x32.png" type="image/png">

  <!-- loader-->
  <link href="assets/css/pace.min.css" rel="stylesheet">
  <script src="assets/js/pace.min.js"></script>

  <!--plugins-->
  <link href="assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" type="text/css" href="assets/plugins/metismenu/mm-vertical.css">

  <!--bootstrap css-->
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <!--main css-->
  <link href="assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="sass/main.css" rel="stylesheet">
  <link href="sass/dark-theme.css" rel="stylesheet">
  <link href="sass/blue-theme.css" rel="stylesheet">
  <link href="sass/responsive.css" rel="stylesheet">
</head>

<body>

  <!--authentication-->
  <div class="auth-basic-wrapper d-flex align-items-center justify-content-center">
    <div class="container-fluid my-5 my-lg-0">
      <div class="row">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5 col-xxl-4 mx-auto">
          <div class="card rounded-4 mb-0 border-top border-4 border-primary border-gradient-1">
            <div class="card-body p-5">
              <img src="assets/images/logo1.png" class="mb-4" width="300" alt="">
              <h4 class="fw-bold">Get Started Now</h4>
              <p class="mb-0">Enter your credentials to login your account</p>

              <!-- Error/Success Message -->
              <div id="alertMessage" class="alert alert-dismissible fade d-none mt-3" role="alert">
                <span id="alertText"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>

              <div class="form-body my-5">
                <form class="row g-3" id="loginForm">
                  <div class="col-12">
                    <label for="inputEmailAddress" class="form-label">gmail</label>
                    <input type="email" class="form-control" id="inputEmailAddress" placeholder="jhon@example.com" required>
                  </div>
                  <div class="col-12">
                    <label for="inputChoosePassword" class="form-label">Password</label>
                    <div class="input-group" id="show_hide_password">
                      <input type="password" class="form-control border-end-0" id="inputChoosePassword" placeholder="Enter Password" required>
                      <a href="javascript:;" class="input-group-text bg-transparent"><i class="bi bi-eye-slash-fill"></i></a>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked">
                      <label class="form-check-label" for="flexSwitchCheckChecked">Remember Me</label>
                    </div>
                  </div>
                  <div class="col-md-6 text-end">
                    <a href="auth-basic-forgot-password.html">Forgot Password ?</a>
                  </div>
                  <div class="col-12">
                    <div class="d-grid">
                      <button type="submit" class="btn btn-grd-primary" id="loginBtn">
                        <span id="btnText">Login</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                      </button>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="text-start">
                      <p class="mb-0">Don't have an account yet? <a href="auth-basic-register.html">Sign up here</a></p>
                    </div>
                  </div>
                </form>
              </div>

            </div>
          </div>
        </div>
      </div><!--end row-->
    </div>
  </div>
  <!--authentication-->

  <!--plugins-->
  <script src="assets/js/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Login Script -->
  <script type="module">
    console.log("✅ Login page script loaded");

    // Import from your existing firebase-config.js
    import { auth } from './js/firebase-config.js';
    import { login } from './js/auth.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    console.log("📦 Firebase modules imported:", { auth, login });

    // Show/hide password toggle
    const showHidePassword = document.getElementById('show_hide_password');
    const passwordInput = document.getElementById('inputChoosePassword');
    const toggleIcon = showHidePassword.querySelector('i');

    showHidePassword.querySelector('a').addEventListener('click', function(e) {
      e.preventDefault();
      console.log("👁️ Toggle password visibility clicked");
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye-slash-fill');
        toggleIcon.classList.add('bi-eye-fill');
        console.log("🔓 Password is now visible");
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-fill');
        toggleIcon.classList.add('bi-eye-slash-fill');
        console.log("🔒 Password is now hidden");
      }
    });

    // Display alert messages
    function showAlert(message, type = 'danger') {
      console.log(`⚠️ Alert triggered [${type}]:`, message);
      const alertBox = document.getElementById('alertMessage');
      const alertText = document.getElementById('alertText');
      
      alertText.textContent = message;
      alertBox.className = `alert alert-${type} alert-dismissible fade show mt-3`;
      
      // Auto-hide after 5 seconds
      setTimeout(() => {
        alertBox.classList.remove('show');
        alertBox.classList.add('d-none');
      }, 5000);
    }

    // Get user-friendly error message
    function getErrorMessage(errorCode) {
      console.log("❌ Handling Firebase error:", errorCode);
      switch (errorCode) {
        case 'auth/invalid-email':
          return 'Invalid email address format.';
        case 'auth/user-disabled':
          return 'This account has been disabled.';
        case 'auth/user-not-found':
          return 'No account found with this email.';
        case 'auth/wrong-password':
          return 'Incorrect password.';
        case 'auth/invalid-credential':
          return 'Invalid email or password.';
        case 'auth/too-many-requests':
          return 'Too many failed login attempts. Please try again later.';
        case 'auth/network-request-failed':
          return 'Network error. Please check your internet connection.';
        default:
          return 'Login failed. Please try again.';
      }
    }

    // Login form submission
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      console.log("📝 Login form submitted");

      const email = document.getElementById('inputEmailAddress').value.trim();
      const password = document.getElementById('inputChoosePassword').value;

      console.log("📧 Email entered:", email);
      console.log("🔑 Password length:", password.length);

      // Disable button and show spinner
      loginBtn.disabled = true;
      btnText.classList.add('d-none');
      btnSpinner.classList.remove('d-none');
      console.log("⏳ Login process started...");

      try {
        await login(email, password);
        console.log("✅ Login successful — redirect should happen from auth.js");
      } catch (error) {
        console.error('❌ Login error:', error.code, error.message);
        showAlert(getErrorMessage(error.code), 'danger');
        
        // Re-enable button
        loginBtn.disabled = false;
        btnText.classList.remove('d-none');
        btnSpinner.classList.add('d-none');
      }
    });

    console.log("🚀 Login script initialized successfully");
  </script>

</body>
</html>
