<!doctype html>
<html lang="en" data-bs-theme="blue-theme">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maxton | Bootstrap 5 Admin Dashboard Template</title>
  <!--favicon-->
	<link rel="icon" href="assets/images/favicon-32x32.png" type="image/png">
  <!-- loader-->
	<link href="assets/css/pace.min.css" rel="stylesheet">
	<script src="assets/js/pace.min.js"></script>

  <!--plugins-->
  <link href="assets/plugins/perfect-scrollbar/css/perfect-scrollbar.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="assets/plugins/metismenu/metisMenu.min.css">
  <link rel="stylesheet" type="text/css" href="assets/plugins/metismenu/mm-vertical.css">
  <!--bootstrap css-->
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
  <!--main css-->
  <link href="assets/css/bootstrap-extended.css" rel="stylesheet">
  <link href="sass/main.css" rel="stylesheet">
  <link href="sass/dark-theme.css" rel="stylesheet">
  <link href="sass/blue-theme.css" rel="stylesheet">
  <link href="sass/responsive.css" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  </head>

  <body>

    <!--authentication-->
    <div class="auth-basic-wrapper d-flex align-items-center justify-content-center">
      <div class="container-fluid my-5 my-lg-0">
        <div class="row">
           <div class="col-12 col-md-8 col-lg-6 col-xl-5 col-xxl-4 mx-auto">
            <div class="card rounded-4 mb-0 border-top border-4 border-primary border-gradient-1">
              <div class="card-body p-5">
                  <img src="assets/images/logo1.png" class="mb-4" width="300" alt="">
                  <h4 class="fw-bold">Get Started Now</h4>
                  <p class="mb-0">Enter your credentials to login your account</p>

                  <!-- Error/Success Message -->
                  <div id="alertMessage" class="alert alert-dismissible fade d-none mt-3" role="alert">
                    <span id="alertText"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>

                  <div class="form-body my-5">
										<form class="row g-3" id="loginForm">
											<div class="col-12">
												<label for="inputEmailAddress" class="form-label">Email</label>
												<input type="email" class="form-control" id="inputEmailAddress" placeholder="jhon@example.com" required>
											</div>
											<div class="col-12">
												<label for="inputChoosePassword" class="form-label">Password</label>
												<div class="input-group" id="show_hide_password">
													<input type="password" class="form-control border-end-0" id="inputChoosePassword" placeholder="Enter Password" required> 
                          <a href="javascript:;" class="input-group-text bg-transparent"><i class="bi bi-eye-slash-fill"></i></a>
												</div>
											</div>
											<div class="col-md-6">
												<div class="form-check form-switch">
													<input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked">
													<label class="form-check-label" for="flexSwitchCheckChecked">Remember Me</label>
												</div>
											</div>
											<div class="col-md-6 text-end">	<a href="auth-basic-forgot-password.html">Forgot Password ?</a>
											</div>
											<div class="col-12">
												<div class="d-grid">
													<button type="submit" class="btn btn-grd-primary" id="loginBtn">
                            <span id="btnText">Login</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                          </button>
												</div>
											</div>
											<div class="col-12">
												<div class="text-start">
													<p class="mb-0">Don't have an account yet? <a href="auth-basic-register.html">Sign up here</a>
													</p>
												</div>
											</div>
										</form>
				</div>

              </div>
            </div>
           </div>
        </div><!--end row-->
     </div>
    </div>
    <!--authentication-->


    <!--plugins-->
    <script src="assets/js/jquery.min.js"></script>

    <script>
      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCmaZ_ojXb5Xkg9b5pu4ng0WaNzw42BEwc",
        authDomain: "dhanda-c6f81.firebaseapp.com",
        databaseURL: "https://dhanda-c6f81-default-rtdb.firebaseio.com",
        projectId: "dhanda-c6f81",
        storageBucket: "dhanda-c6f81.firebasestorage.app",
        messagingSenderId: "1078087902179",
        appId: "1:1078087902179:web:7291c62f89528e732176d6",
        measurementId: "G-QG764Y58JM"
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // Function to show alert messages
      function showAlert(message, type) {
        const alertDiv = document.getElementById('alertMessage');
        const alertText = document.getElementById('alertText');
        
        alertDiv.className = `alert alert-${type} alert-dismissible fade show mt-3`;
        alertText.textContent = message;
        alertDiv.classList.remove('d-none');

        // Auto hide after 5 seconds
        setTimeout(() => {
          alertDiv.classList.add('d-none');
        }, 5000);
      }

      // Function to toggle loading state
      function setLoading(isLoading) {
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        
        if (isLoading) {
          loginBtn.disabled = true;
          btnText.classList.add('d-none');
          btnSpinner.classList.remove('d-none');
        } else {
          loginBtn.disabled = false;
          btnText.classList.remove('d-none');
          btnSpinner.classList.add('d-none');
        }
      }

      $(document).ready(function () {
        // Password show/hide toggle
        $("#show_hide_password a").on('click', function (event) {
          event.preventDefault();
          if ($('#show_hide_password input').attr("type") == "text") {
            $('#show_hide_password input').attr('type', 'password');
            $('#show_hide_password i').addClass("bi-eye-slash-fill");
            $('#show_hide_password i').removeClass("bi-eye-fill");
          } else if ($('#show_hide_password input').attr("type") == "password") {
            $('#show_hide_password input').attr('type', 'text');
            $('#show_hide_password i').removeClass("bi-eye-slash-fill");
            $('#show_hide_password i').addClass("bi-eye-fill");
          }
        });

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
          if (user) {
            // User is signed in, redirect to dashboard
            console.log('User already logged in:', user.email);
            // Uncomment the line below to enable auto-redirect
            // window.location.href = 'dashboard.html';
          }
        });

        // Handle login form submission
        $('#loginForm').on('submit', function(e) {
          e.preventDefault();
          
          const email = $('#inputEmailAddress').val().trim();
          const password = $('#inputChoosePassword').val();
          const rememberMe = $('#flexSwitchCheckChecked').is(':checked');

          // Validate inputs
          if (!email || !password) {
            showAlert('Please fill in all fields', 'danger');
            return;
          }

          setLoading(true);

          // Set persistence based on "Remember Me"
          const persistence = rememberMe ? 
            firebase.auth.Auth.Persistence.LOCAL : 
            firebase.auth.Auth.Persistence.SESSION;

          auth.setPersistence(persistence)
            .then(() => {
              // Sign in with Firebase
              return auth.signInWithEmailAndPassword(email, password);
            })
            .then((userCredential) => {
              // Login successful
              const user = userCredential.user;
              console.log('Login successful:', user.email);
              showAlert('Login successful! Redirecting...', 'success');
              
              // Redirect after 1 second
              setTimeout(() => {
                window.location.href = 'dashboard.html'; // Change to your dashboard page
              }, 1000);
            })
            .catch((error) => {
              // Handle errors
              setLoading(false);
              let errorMessage = 'Login failed. Please try again.';
              
              switch (error.code) {
                case 'auth/invalid-email':
                  errorMessage = 'Invalid email address.';
                  break;
                case 'auth/user-disabled':
                  errorMessage = 'This account has been disabled.';
                  break;
                case 'auth/user-not-found':
                  errorMessage = 'No account found with this email.';
                  break;
                case 'auth/wrong-password':
                  errorMessage = 'Incorrect password.';
                  break;
                case 'auth/invalid-credential':
                  errorMessage = 'Invalid email or password.';
                  break;
                case 'auth/too-many-requests':
                  errorMessage = 'Too many failed attempts. Please try again later.';
                  break;
                default:
                  errorMessage = error.message;
              }
              
              showAlert(errorMessage, 'danger');
              console.error('Login error:', error);
            });
        });
      });
    </script>
  
  </body>
</html>
